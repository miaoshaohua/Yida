version: '3.8'

services:
  postgres:
    image: bitnami/postgresql:latest
    container_name: yida-postgres
    environment:
      POSTGRESQL_USERNAME: yida
      POSTGRESQL_PASSWORD: ${POSTGRES_PASSWORD:-yida123}
      POSTGRESQL_DATABASE: yida
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/bitnami/postgresql
    networks:
      - yida-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yida -d yida"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: bitnami/redis:latest
    container_name: yida-redis
    environment:
      ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/bitnami/redis/data
    networks:
      - yida-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yida-backend
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://yida:${POSTGRES_PASSWORD:-yida123}@postgres:5432/yida?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      STORAGE_MODE: ${STORAGE_MODE:-r2}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-yida-images}
      R2_PRESIGNED_URL_EXPIRES_IN: 1800
      FASHN_API_KEY: ${FASHN_API_KEY}
      FASHN_API_URL: ${FASHN_API_URL}
      SMS_PROVIDER: ${SMS_PROVIDER:-aliyun}
      SMS_ACCESS_KEY_ID: ${SMS_ACCESS_KEY_ID}
      SMS_ACCESS_KEY_SECRET: ${SMS_ACCESS_KEY_SECRET}
      SMS_SIGN_NAME: ${SMS_SIGN_NAME:-AI试衣间}
      SMS_TEMPLATE_CODE: ${SMS_TEMPLATE_CODE:-SMS_123456789}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@yida.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    ports:
      - "3000:3000"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - yida-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000}
    container_name: yida-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - yida-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  uploads_data:

networks:
  yida-network:
    driver: bridge
