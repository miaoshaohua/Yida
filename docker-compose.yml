version: '3.8'

services:
  postgres:
    image: bitnami/postgresql:latest
    container_name: yida-postgres
    environment:
      POSTGRESQL_USERNAME: yida
      POSTGRESQL_PASSWORD: yida123
      POSTGRESQL_DATABASE: yida
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/bitnami/postgresql
    networks:
      - yida-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yida -d yida"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: bitnami/redis:latest
    container_name: yida-redis
    environment:
      ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/bitnami/redis/data
    networks:
      - yida-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:

networks:
  yida-network:
    driver: bridge
