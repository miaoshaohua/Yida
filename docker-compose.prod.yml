version: '3.8'

# 使用现有的MySQL和Redis服务
# MySQL: 42.194.162.239:13306 (root/123456)
# Redis: 42.194.162.239:16379

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yida-backend
    environment:
      NODE_ENV: production
      PORT: 3000
      # 使用现有的MySQL
      DATABASE_URL: mysql://root:123456@42.194.162.239:13306/yida?schema=public
      # 使用现有的Redis
      REDIS_HOST: 42.194.162.239
      REDIS_PORT: 16379
      REDIS_PASSWORD: ""
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      STORAGE_MODE: ${STORAGE_MODE:-r2}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-yida-images}
      R2_PRESIGNED_URL_EXPIRES_IN: 1800
      FASHN_API_KEY: ${FASHN_API_KEY}
      FASHN_API_URL: ${FASHN_API_URL}
      SMS_PROVIDER: ${SMS_PROVIDER:-aliyun}
      SMS_ACCESS_KEY_ID: ${SMS_ACCESS_KEY_ID}
      SMS_ACCESS_KEY_SECRET: ${SMS_ACCESS_KEY_SECRET}
      SMS_SIGN_NAME: ${SMS_SIGN_NAME:-AI试衣间}
      SMS_TEMPLATE_CODE: ${SMS_TEMPLATE_CODE:-SMS_123456789}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@yida.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    ports:
      - "3000:3000"
    # 移除 depends_on，因为使用外部服务
    networks:
      - yida-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000}
    container_name: yida-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - yida-network
    restart: unless-stopped

networks:
  yida-network:
    driver: bridge
